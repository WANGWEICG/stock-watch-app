<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>兄弟看盤 Pro</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <div class="eyebrow">BRO STOCK WATCH PRO</div>
        <h1>兄弟看盤 Pro</h1>
        <p id="marketNote">載入真實行情中...</p>
      </div>
      <button id="refreshBtn" class="refresh">更新</button>
    </header>

    <section class="statusPanel">
      <div>
        <span class="label">資料狀態</span>
        <strong id="dataStatus">準備中</strong>
      </div>
      <div>
        <span class="label">最後更新</span>
        <strong id="lastUpdated">--</strong>
      </div>
    </section>

    <main id="cards" class="cards"></main>

    <section class="alertBox" id="alertBox">
      <h2>提醒條件</h2>
      <p>0050 KD 的 K 值小於 20 時，會在畫面上顯示超賣提醒。</p>
      <div id="kdAlert" class="kdAlert muted">等待 0050 KD 資料...</div>
    </section>

    <section class="watchlist">
      <h2>自選股</h2>
      <div class="addRow">
        <input id="symbolInput" placeholder="例如 2330、2317、AAPL、NVDA" />
        <button id="addBtn">加入</button>
      </div>
      <p class="hint">台股上市用代號即可，例如 2330；美股用英文代號，例如 TSLA。</p>
    </section>

    <section class="disclaimer">
      <h2>資料說明</h2>
      <p>台股即時欄位嘗試使用臺灣證交所公開行情服務；美股使用 Yahoo Finance Chart API。免費公開資料可能延遲、休市時不更新，或因瀏覽器 CORS / API 限制暫時讀不到。</p>
      <p>這是看盤輔助工具，不是投資建議，也不是券商下單系統。</p>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
